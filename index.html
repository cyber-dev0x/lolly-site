<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lolly — Meme Anime Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div
      class="bg-photo"
      aria-hidden="true"
      style="background-image: url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1920&q=80')"
    ></div>
    <div class="noise" aria-hidden="true"></div>
    <div class="stickers" aria-hidden="true">
      <span class="sticker s1">BONK</span>
      <span class="sticker s2">SHEESH</span>
      <span class="sticker s3">SKILL ISSUE?</span>
      <span class="sticker s4">NO THOUGHTS</span>
    </div>

    <main class="app">
      <header class="topbar">
        <div class="profile">
          <div class="avatar-wrap">
            <div class="avatar">🍭</div>
            <span class="live-dot"></span>
          </div>
          <div>
            <h1>Lolly Chat.exe</h1>
            <p>anime chaos mode • meme-certified</p>
          </div>
        </div>

        <nav class="header-actions">
          <a class="gh-link" href="https://github.com/cyber-dev0x/lolly-site" target="_blank" rel="noreferrer">
            GitHub ↗
          </a>
          <div class="status" id="status">online</div>
        </nav>
      </header>

      <div class="meme-banner" aria-hidden="true">
        <span>W</span>
        <span>chaos</span>
        <span>100%</span>
        <span>certified</span>
      </div>

      <section id="chat" class="chat" aria-live="polite"></section>

      <div class="chips" id="chips">
        <button type="button">drop a meme</button>
        <button type="button">i feel sad</button>
        <button type="button">help me focus</button>
        <button type="button">roast me lightly</button>
      </div>

      <form id="form" class="composer">
        <input
          id="input"
          type="text"
          autocomplete="off"
          placeholder="Type something unhinged..."
          aria-label="Message"
          required
        />
        <button type="submit">Send</button>
      </form>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
